# All six microfrontends: identical shape, one nginx Deployment + Service each.
# Images are built from Dockerfile.frontend with --build-arg APP=<name>;
# the shell image additionally bakes in REMOTE_*_URL and VITE_API_* args
# (see k8s/README.md for the exact build commands).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  namespace: aip-frontend
spec:
  replicas: 1
  selector:
    matchLabels: { app: shell }
  template:
    metadata:
      labels: { app: shell }
    spec:
      containers:
        - name: shell
          image: aip/shell:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  namespace: aip-frontend
spec:
  selector: { app: shell }
  ports: [{ port: 80 }]
