apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: aip-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: aip/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AIP_REDIS_HOST
              value: redis.aip-data.svc.cluster.local
            - name: AIP_AUTH_URL
              value: http://auth-service.aip-platform.svc.cluster.local
            - name: AIP_INTERVIEW_URL
              value: http://interview-platform.aip-platform.svc.cluster.local
            - name: AIP_NOTIFICATION_URL
              value: http://notification-service.aip-platform.svc.cluster.local
            - name: AIP_OTLP_ENDPOINT
              value: http://jaeger.aip-observability.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 150m, memory: 384Mi }
            limits: { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: aip-platform
spec:
  selector:
    app: gateway-service
  ports:
    - port: 80
      targetPort: 8080
