# DEV-ONLY values. In a real environment this file is replaced by
# SealedSecrets / External Secrets Operator (ARCHITECTURE.md §9) —
# never commit production secrets in plain text.
apiVersion: v1
kind: Secret
metadata:
  name: aip-secrets
  namespace: aip-platform
stringData:
  jwt-secret: local-dev-only-secret-change-me-0123456789abcdef
  db-password: aip_local_pw
---
apiVersion: v1
kind: Secret
metadata:
  name: aip-secrets
  namespace: aip-data
stringData:
  db-password: aip_local_pw
