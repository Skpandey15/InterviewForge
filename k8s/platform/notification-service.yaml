apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: aip-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: aip/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: AIP_NOTIFICATION_DB_URL
              value: jdbc:postgresql://postgres.aip-data.svc.cluster.local:5432/interview_db
            - name: AIP_DB_USER
              value: aip
            - name: AIP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aip-secrets
                  key: db-password
            - name: AIP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aip-secrets
                  key: jwt-secret
            - name: AIP_KAFKA_BOOTSTRAP
              value: kafka.aip-data.svc.cluster.local:9092
            - name: AIP_OTLP_ENDPOINT
              value: http://jaeger.aip-observability.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits: { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: aip-platform
spec:
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8084
