apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: aip-data
data:
  init.sql: |
    CREATE DATABASE auth_db OWNER aip;
    CREATE DATABASE interview_db OWNER aip;
    \connect interview_db
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: aip-data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: aip
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aip-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: aip
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aip"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aip-data
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
