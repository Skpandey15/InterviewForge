# App-of-apps: apply this one Application manually (or via the ArgoCD UI);
# it manages everything under k8s/argocd/apps/. Same pattern as the
# focus-forge-gitops repo. Replace repoURL with your Gitea remote.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aip-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitea.local/you/tech-interview.git   # ← your repo
    targetRevision: main
    path: k8s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
