apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aip-namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://gitea.local/you/tech-interview.git
    targetRevision: main
    path: k8s
    directory:
      include: "namespaces.yaml"
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: { prune: true, selfHeal: true }
---
