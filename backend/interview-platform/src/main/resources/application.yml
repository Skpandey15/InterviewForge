spring:
  application:
    name: interview-platform
  datasource:
    url: ${AIP_INTERVIEW_DB_URL:jdbc:postgresql://localhost:5432/interview_db}
    username: ${AIP_DB_USER:aip}
    password: ${AIP_DB_PASSWORD:aip_local_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${AIP_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

server:
  port: ${AIP_INTERVIEW_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${AIP_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}

aip:
  jwt:
    # Must match auth-service. Override via env outside local.
    secret: ${AIP_JWT_SECRET:local-dev-only-secret-change-me-0123456789abcdef}
  cors:
    allowed-origins: ${AIP_CORS_ORIGINS:http://localhost:3000}
  ai-gateway:
    # 127.0.0.1 (not localhost): uvicorn binds IPv4 loopback only by default.
    base-url: ${AIP_AI_GATEWAY_URL:http://127.0.0.1:8090}
    timeout: PT10S
  outbox:
    poll-interval-ms: 1000
