spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${AIP_REDIS_HOST:localhost}
      port: 6379
  cloud:
    gateway:
      # Downstream services also emit CORS headers for direct access;
      # keep exactly one copy when fronted by the gateway.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:3000
              - http://aip.localtest.me:8081
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: [Authorization, Content-Type]
      routes:
        - id: auth
          uri: ${AIP_AUTH_URL:http://127.0.0.1:8083}
          predicates:
            - Path=/api/v1/auth/**
        - id: interviews
          uri: ${AIP_INTERVIEW_URL:http://127.0.0.1:8082}
          predicates:
            - Path=/api/v1/interviews/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@principalKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
        - id: notifications
          uri: ${AIP_NOTIFICATION_URL:http://127.0.0.1:8084}
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: ${AIP_GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      # Lets the Help & Support status panel read gateway health from the browser.
      cors:
        allowed-origins: ${AIP_CORS_ORIGINS:http://localhost:3000}
        allowed-methods: GET
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${AIP_OTLP_ENDPOINT:http://127.0.0.1:4318/v1/traces}
